name: Package CI/CD

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish:
        description: Publish package to npm
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: package-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 18.x
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Resolve release
        id: release
        shell: bash
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          should_publish=false
          reason="package version did not change"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            should_publish="${{ inputs.publish }}"
            reason="manual publish requested"
          else
            previous_version=""

            if git rev-parse HEAD^ >/dev/null 2>&1 && git show HEAD^:package.json >/tmp/previous-package.json 2>/dev/null; then
              previous_version="$(node -p "require('/tmp/previous-package.json').version")"
            fi

            if [[ "${previous_version}" != "${version}" ]]; then
              should_publish=true
              reason="package version changed from ${previous_version:-none} to ${version}"
            fi
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            should_publish=false
            reason="tag ${tag} already exists"
          fi

          if npm view "${package_name}@${version}" version >/dev/null 2>&1; then
            should_publish=false
            reason="npm version ${package_name}@${version} already exists"
          fi

          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          echo "${reason}"

      - name: Install dependencies
        if: steps.release.outputs.should_publish == 'true'
        run: npm ci

      - name: Run unit tests
        if: steps.release.outputs.should_publish == 'true'
        run: npm test

      - name: Build package
        if: steps.release.outputs.should_publish == 'true'
        run: npm run build

      - name: Verify package contents
        if: steps.release.outputs.should_publish == 'true'
        run: npm pack --dry-run

      - name: Create release tag
        if: steps.release.outputs.should_publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Publish package
        if: steps.release.outputs.should_publish == 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
